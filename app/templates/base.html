<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ app_name }}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/styles.css">
{% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <a href="/" class="nav-logo">
      <span class="logo-icon">✦</span> {{ app_name }}
    </a>
    <div class="nav-links">
      <a href="/upload" class="nav-link">Analyze</a>
      <a href="/history" class="nav-link">History</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</nav>

<main>
{% block content %}{% endblock %}
</main>

<footer class="footer">
  <p>&copy; 2026 {{ app_name }}. Built with FastAPI &amp; Sentence Transformers.</p>
</footer>

<script src="/static/js/theme.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
